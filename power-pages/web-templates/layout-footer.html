  <script>
document.addEventListener('DOMContentLoaded', function () {
  var forms = Array.prototype.slice.call(document.querySelectorAll('form[data-site-search-panel][role="search"]'));
  var pageCache = {};

  if (!forms.length) {
    return;
  }

  function normalize(value) {
    return (value || '').toLowerCase().replace(/\s+/g, ' ').trim();
  }

  function isVisible(element) {
    return !element.hidden && !element.closest('[hidden]');
  }

  function cleanText(value) {
    return (value || '').replace(/\s+/g, ' ').trim();
  }

  function getTitle(element) {
    var podId = element.querySelector('.pod-id');
    var podLead = element.querySelector('.pod-lead');
    var title = element.querySelector('.card-title, .section-title, .page-title, .hero-title, .team-label, .doc-type, .eyebrow');

    if (podId || podLead) {
      return cleanText([podId ? podId.textContent : '', podLead ? podLead.textContent : ''].filter(Boolean).join(' — '));
    }

    if (title) {
      return cleanText(title.textContent);
    }

    return cleanText(element.textContent).slice(0, 72);
  }

  function getCategory(element) {
    if (element.matches('.pod-card')) {
      return 'POD Structure';
    }
    if (element.matches('.numbers-placeholder')) {
      return 'Numbers';
    }
    if (element.matches('.guidance-change-panel')) {
      return 'Guidance Calendar';
    }
    if (element.matches('.resource-section')) {
      return 'Resource';
    }
    return 'Page';
  }

  function getUrl(element, baseUrl) {
    var link = element.matches('a[href]') ? element : element.querySelector('a[href]');
    var section = element.id ? element : element.closest('section[id]');

    if (link && link.getAttribute('href') && link.getAttribute('href') !== '#') {
      return new URL(link.getAttribute('href'), baseUrl).href;
    }

    if (section && section.id) {
      return new URL('#' + section.id, baseUrl).href;
    }

    return new URL(baseUrl).href;
  }

  function getExcerpt(text, query) {
    var clean = cleanText(text);
    var lower = clean.toLowerCase();
    var index = lower.indexOf(query.toLowerCase());
    var start = index > 42 ? index - 42 : 0;
    var excerpt = clean.slice(start, start + 170);

    if (start > 0) {
      excerpt = '…' + excerpt;
    }

    if (start + 170 < clean.length) {
      excerpt += '…';
    }

    return excerpt;
  }

  function collectRecords(root, baseUrl) {
    var selector = '.document-card, .team-card, .pod-card, .resource-section, .guidance-change-panel, section.hero, section.page-panel';
    return Array.prototype.slice.call(root.querySelectorAll(selector)).filter(function (element) {
      if (!isVisible(element)) {
        return false;
      }
      if (element.matches('section.page-panel') && element.querySelector('.document-card, .team-card, .pod-card, .resource-section')) {
        return false;
      }
      return cleanText(element.textContent).length > 24;
    }).map(function (element) {
      var text = cleanText(element.textContent);
      return {
        title: getTitle(element),
        category: getCategory(element),
        text: text,
        normalizedText: normalize(text),
        url: getUrl(element, baseUrl),
        element: root === document ? element : null
      };
    });
  }

  function getPageUrls() {
    var urls = Array.prototype.slice.call(document.querySelectorAll('[data-site-nav] .nav-link[href]')).map(function (link) {
      var href = link.getAttribute('href');
      if (!href || href.indexOf('#') === 0 || href.indexOf('mailto:') === 0 || href.indexOf('tel:') === 0) {
        return '';
      }
      return new URL(href, window.location.href).href.split('#')[0];
    }).filter(Boolean);

    return Array.from(new Set(urls)).filter(function (url) {
      return new URL(url).origin === window.location.origin && url !== window.location.href.split('#')[0];
    });
  }

  function fetchPageRecords(url) {
    if (pageCache[url]) {
      return pageCache[url];
    }

    pageCache[url] = fetch(url, { credentials: 'same-origin' }).then(function (response) {
      if (!response.ok) {
        return [];
      }
      return response.text();
    }).then(function (html) {
      var parsed = new DOMParser().parseFromString(html, 'text/html');
      return collectRecords(parsed, url);
    }).catch(function () {
      return [];
    });

    return pageCache[url];
  }

  function getRecords() {
    var localRecords = collectRecords(document, window.location.href);
    var pageUrls = getPageUrls();

    if (!pageUrls.length) {
      return Promise.resolve(localRecords);
    }

    return Promise.all(pageUrls.map(fetchPageRecords)).then(function (remoteGroups) {
      var allRecords = localRecords.concat.apply(localRecords, remoteGroups);
      var seen = {};
      return allRecords.filter(function (record) {
        var key = record.url + '|' + record.title + '|' + record.text.slice(0, 60);
        if (seen[key]) {
          return false;
        }
        seen[key] = true;
        return true;
      });
    });
  }

  function scoreRecord(record, query) {
    var normalizedQuery = normalize(query);
    var tokens = normalizedQuery.split(' ').filter(Boolean);
    var score = 0;

    if (!tokens.length) {
      return 0;
    }

    if (normalize(record.title).indexOf(normalizedQuery) !== -1) {
      score += 8;
    }

    if (normalize(record.category).indexOf(normalizedQuery) !== -1) {
      score += 4;
    }

    if (record.normalizedText.indexOf(normalizedQuery) !== -1) {
      score += 5;
    }

    tokens.forEach(function (token) {
      if (record.normalizedText.indexOf(token) !== -1) {
        score += 1;
      }
    });

    return score;
  }

  function ensureResults(form) {
    var panel = form.parentElement.querySelector('[data-site-search-results]');
    var feedback;
    var list;

    if (!panel) {
      panel = document.createElement('div');
      panel.className = 'site-search-panel';
      panel.setAttribute('data-site-search-results', '');
      feedback = document.createElement('p');
      feedback.className = 'site-search-feedback';
      list = document.createElement('div');
      list.className = 'site-search-results';
      panel.append(feedback, list);
      form.insertAdjacentElement('afterend', panel);
    }

    return {
      panel: panel,
      feedback: panel.querySelector('.site-search-feedback'),
      list: panel.querySelector('.site-search-results')
    };
  }

  function renderResults(form, matches, query) {
    var ui = ensureResults(form);
    var resultLimit = 10;
    var visibleMatches = matches.slice(0, resultLimit);
    ui.list.innerHTML = '';

    if (!matches.length) {
      ui.feedback.textContent = 'No results found for “' + query + '”.';
      return;
    }

    ui.feedback.textContent = matches.length + ' result' + (matches.length === 1 ? '' : 's') + ' found for “' + query + '”.' + (matches.length > resultLimit ? ' Showing top ' + resultLimit + '.' : '');

    visibleMatches.forEach(function (record) {
      var result = document.createElement('a');
      var category = document.createElement('span');
      var title = document.createElement('strong');
      var excerpt = document.createElement('span');

      result.className = 'site-search-result';
      result.href = record.url;
      category.className = 'site-search-category';
      category.textContent = record.category;
      title.textContent = record.title;
      excerpt.textContent = getExcerpt(record.text, query);
      result.append(category, title, excerpt);
      result.addEventListener('click', function () {
        var overlay = document.querySelector('[data-search-overlay]');
        if (overlay) {
          overlay.hidden = true;
          document.documentElement.classList.remove('is-search-overlay-open');
        }
      });
      ui.list.appendChild(result);
    });

    if (!form.hasAttribute('data-overlay-search-form') && matches[0] && matches[0].element) {
      matches[0].element.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  function runSearch(form) {
    var input = form.querySelector('input[type="search"], input[name="q"]');
    var ui = ensureResults(form);
    var query = input ? input.value.trim() : '';

    if (!query) {
      ui.feedback.textContent = 'Enter a keyword to search this hub.';
      ui.list.innerHTML = '';
      return;
    }

    ui.feedback.textContent = 'Searching for “' + query + '”…';
    ui.list.innerHTML = '';

    getRecords().then(function (records) {
      var matches = records.map(function (record) {
        return Object.assign({}, record, { score: scoreRecord(record, query) });
      }).filter(function (record) {
        return record.score > 0;
      }).sort(function (a, b) {
        return b.score - a.score;
      });

      renderResults(form, matches, query);
    });
  }

  forms.forEach(function (form, index) {
    var input = form.querySelector('input[type="search"], input[name="q"]');
    var initialQuery = new URLSearchParams(window.location.search).get('q');

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      runSearch(form);
    });

    if (input) {
      var liveSearchTimer;

      input.addEventListener('input', function () {
        window.clearTimeout(liveSearchTimer);

        if (!input.value.trim()) {
          ensureResults(form).panel.remove();
          return;
        }

        liveSearchTimer = window.setTimeout(function () {
          runSearch(form);
        }, 140);
      });

      if (index === 0 && initialQuery && !input.value) {
        input.value = initialQuery;
        runSearch(form);
      }
    }
  });
});
  </script>

  <script>
document.addEventListener('DOMContentLoaded', function () {
  var guidanceModal = document.querySelector('[data-guidance-modal]');
  var guidanceCloseButton = document.querySelector('[data-guidance-close]');
  var monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
  var fullMonthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];

  function closeGuidanceModal() {
    if (!guidanceModal) {
      return;
    }

    guidanceModal.hidden = true;
    document.body.style.overflow = '';
  }

  function openGuidanceModal(guidance) {
    if (!guidanceModal) {
      return;
    }

    var title = guidanceModal.querySelector('[data-guidance-modal-title]');
    var date = guidanceModal.querySelector('[data-guidance-modal-date]');
    var owner = guidanceModal.querySelector('[data-guidance-modal-owner]');
    var body = guidanceModal.querySelector('[data-guidance-modal-body]');

    if (title) {
      title.textContent = guidance.title || '';
    }

    if (date) {
      date.textContent = guidance.displayDate || '';
    }

    if (owner) {
      owner.textContent = 'Owner: ' + (guidance.owner || '');
    }

    if (body) {
      body.textContent = guidance.fullGuidance || guidance.summary || '';

    guidanceModal.hidden = false;
    document.body.style.overflow = 'hidden';
  }

  if (guidanceCloseButton) {
    guidanceCloseButton.addEventListener('click', closeGuidanceModal);
  }

  if (guidanceModal) {
    guidanceModal.addEventListener('click', function (event) {
      if (event.target === guidanceModal) {
        closeGuidanceModal();
      }
    });
  }

  document.addEventListener('keydown', function (event) {
    if (event.key === 'Escape') {
      closeGuidanceModal();
    }

  function parseCsv(csv) {
    var rows = [];
    var row = [];
    var field = '';
    var inQuotes = false;

    for (var index = 0; index < csv.length; index += 1) {
      var char = csv[index];
      var nextChar = csv[index + 1];

      if (char === '"' && inQuotes && nextChar === '"') {
        field += '"';
        index += 1;
      } else if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === ',' && !inQuotes) {
        row.push(field);
        field = '';
      } else if ((char === '\n' || char === '\r') && !inQuotes) {
        if (char === '\r' && nextChar === '\n') {
          index += 1;
        }
        row.push(field);
        if (row.some(function (value) { return value.trim() !== ''; })) {
          rows.push(row);
        }
        row = [];
        field = '';
      } else {
        field += char;
      }
    }

    if (field || row.length) {
      row.push(field);
      rows.push(row);
    }

    if (!rows.length) {
      return [];
    }

    var headers = rows.shift().map(function (header) {
      return header.trim();
    });

    return rows.map(function (values) {
      return headers.reduce(function (record, header, index) {
        record[header] = values[index] ? values[index].trim() : '';
        return record;
      }, {});
    });
  }

  function parseLocalDate(value) {
    var parts = value.split('-').map(Number);
    return new Date(parts[0], parts[1] - 1, parts[2]);
  }

  function formatDisplayDate(date) {
    return monthNames[date.getMonth()] + ' ' + String(date.getDate()).padStart(2, '0') + ', ' + date.getFullYear();
  }

  function formatIsoDate(date) {
    return [
      date.getFullYear(),
      String(date.getMonth() + 1).padStart(2, '0'),
      String(date.getDate()).padStart(2, '0')
    ].join('-');
  }

  function getWeekStart(date) {
    var weekStart = new Date(date);
    weekStart.setDate(date.getDate() - date.getDay());
    return weekStart;
  }

  function uniqueValues(values) {
    return Array.from(new Set(values));
  }

  function setOptions(select, options, value) {
    select.innerHTML = '';
    options.forEach(function (option) {
      var element = document.createElement('option');
      element.value = option.value;
      element.textContent = option.label;
      select.appendChild(element);
    });
    select.value = value;
  }

  function getFilteredGuidance(records, filters) {
    return records.filter(function (record) {
      var matchesYear = !filters.year || record.year === filters.year;
      var matchesMonth = !filters.month || record.month === filters.month;
      var matchesWeek = !filters.week || record.weekStart === filters.week;
      return matchesYear && matchesMonth && matchesWeek;
    });
  }

  function createGuidanceItem(record) {

    button.type = 'button';

    date.textContent = record.displayDate;

    var title = document.createElement('h4');
    title.className = 'card-title';
    title.textContent = record.title;

    var summary = document.createElement('p');
    summary.className = 'card-text';
    summary.textContent = record.summary;

    var meta = document.createElement('div');
    meta.className = 'doc-meta';
    var owner = document.createElement('span');
    owner.textContent = 'Owner: ' + record.owner;
    var status = document.createElement('span');
    status.textContent = 'Status: ' + record.status;
    meta.append(owner, status);

    button.append(date, title, summary, meta);
    button.addEventListener('click', function () {
      openGuidanceModal(record);
    });

    return button;
  }

  function openGuidanceRecords(records) {
    if (records.length === 1) {
      openGuidanceModal(records[0]);
      return;
    }

    openGuidanceModal({
      title: records.length + ' guidance updates',
      displayDate: records[0].displayDate,
      owner: 'Multiple owners',
      fullGuidance: records.map(function (record) {
        return record.title + '\n' + record.fullGuidance;
      }).join('\n\n')
    });
  }

  var fallbackGuidanceCsv = [
    'id,date,title,summary,owner,status,fullGuidance',
    'cdd-refresh-2026-05-06,2026-05-06,"CDD refresh guidance update","Updated customer due diligence evidence expectations and review notes for analyst execution.","Guidance Team","Published","This guidance change updates customer due diligence evidence expectations and analyst review notes. Analysts should confirm required evidence is present, document any missing information, and apply the refreshed review standard for newly worked cases."',
    'escalation-wording-2026-04-29,2026-04-29,"Escalation wording clarification","Clarified escalation language for cases requiring additional quality or leadership review.","Process Optimization","Published","This update clarifies escalation wording for cases requiring additional quality or leadership review. Analysts should use the revised language when documenting why a case was escalated and what decision or support is required."',
    'tm-disposition-2026-04-22,2026-04-22,"Transaction monitoring disposition notes","Added examples for concise, complete, and auditable disposition narratives.","AML Workstream","Published","This guidance adds examples for concise, complete, and auditable transaction monitoring disposition narratives. Analysts should describe the alert driver, relevant review steps, conclusion, and rationale in a consistent format."'
  ].join('\n');

  function loadGuidanceCsv(source) {
    return fetch(source, { credentials: 'same-origin', cache: 'no-store' }).then(function (response) {
      if (!response.ok) {
        throw new Error('Unable to load guidance updates.');
      }
      return response.text();
    }).then(function (csv) {
      if (csv.indexOf('id,date,title,summary,owner,status,fullGuidance') === -1) {
        return fallbackGuidanceCsv;
      }
      return csv;
    }).catch(function () {
      return fallbackGuidanceCsv;
    });
  }

  function initGuidanceCalendar(section) {
    var source = section.getAttribute('data-guidance-source');
    var yearSelect = section.querySelector('[data-guidance-year]');
    var monthSelect = section.querySelector('[data-guidance-month]');
    var weekSelect = section.querySelector('[data-guidance-week]');
    var title = section.querySelector('[data-guidance-calendar-title]');
    var grid = section.querySelector('[data-guidance-month-grid]');
    var resultsTitle = section.querySelector('[data-guidance-results-title]');
    var results = section.querySelector('[data-guidance-results]');
    var previous = section.querySelector('[data-guidance-prev]');
    var next = section.querySelector('[data-guidance-next]');
    var records = [];
    var calendarDate = new Date();
    var selectedDate = '';

    if (!source || !yearSelect || !monthSelect || !weekSelect || !grid || !results) {
      return;
    }

    function getFilters() {
      return {
        year: yearSelect.value,
        month: monthSelect.value,
        week: weekSelect.value
      };
    }

    function populateFilters() {
      var selectedYear = yearSelect.value;
      var selectedMonth = monthSelect.value;
      var selectedWeek = weekSelect.value;
      var years = uniqueValues(records.map(function (record) { return record.year; })).sort().reverse();

      if (!selectedYear || !years.includes(selectedYear)) {
        selectedYear = years[0] || '';
      }

      var monthRecords = records.filter(function (record) {
        return record.year === selectedYear;
      });
      var months = uniqueValues(monthRecords.map(function (record) { return record.month; })).sort();
      var monthOptions = [{ value: '', label: 'All months' }].concat(months.map(function (month) {
        return { value: month, label: fullMonthNames[Number(month) - 1] };
      }));

      if (selectedMonth && !months.includes(selectedMonth)) {
        selectedMonth = '';
      }

      var weekRecords = monthRecords.filter(function (record) {
        return !selectedMonth || record.month === selectedMonth;
      });
      var weeks = uniqueValues(weekRecords.map(function (record) { return record.weekStart; })).sort().reverse();
      var weekOptions = [{ value: '', label: 'All weeks' }].concat(weeks.map(function (week) {
        return { value: week, label: 'Week of ' + formatDisplayDate(parseLocalDate(week)) };
      }));

      if (selectedWeek && !weeks.includes(selectedWeek)) {
        selectedWeek = '';
      }

      setOptions(yearSelect, years.map(function (year) {
        return { value: year, label: year };
      }), selectedYear);
      setOptions(monthSelect, monthOptions, selectedMonth);
      setOptions(weekSelect, weekOptions, selectedWeek);
    }

    function renderResults() {
      var filteredRecords = getFilteredGuidance(records, getFilters());

      if (selectedDate) {
        filteredRecords = filteredRecords.filter(function (record) {
          return record.date === selectedDate;
        });
      }

      filteredRecords.sort(function (a, b) {
        return b.sortDate - a.sortDate;
      });

      results.innerHTML = '';

      if (resultsTitle) {
        resultsTitle.textContent = filteredRecords.length + ' guidance update' + (filteredRecords.length === 1 ? '' : 's') + ' found';
      }

      if (!filteredRecords.length) {
        var empty = document.createElement('p');
        empty.className = 'card-text';
        empty.textContent = 'No guidance updates found for this selection.';
        results.appendChild(empty);
        return;
      }

      filteredRecords.forEach(function (record) {
        results.appendChild(createGuidanceItem(record));
      });
    }

    function renderCalendar() {
      var year = calendarDate.getFullYear();
      var month = calendarDate.getMonth();
      var firstDay = new Date(year, month, 1);
      var startDate = new Date(firstDay);
      var calendarRecords = getFilteredGuidance(records, getFilters());
      var recordsByDate = calendarRecords.reduce(function (groups, record) {
        groups[record.date] = groups[record.date] || [];
        groups[record.date].push(record);
        return groups;
      }, {});

      startDate.setDate(firstDay.getDate() - firstDay.getDay());

      if (title) {
        title.textContent = fullMonthNames[month] + ' ' + year;
      }

      grid.innerHTML = '';

      for (var dayIndex = 0; dayIndex < 42; dayIndex += 1) {
        var day = new Date(startDate);
        day.setDate(startDate.getDate() + dayIndex);
        var isoDate = formatIsoDate(day);
        var dayRecords = recordsByDate[isoDate] || [];
        var dayButton = document.createElement('button');

        dayButton.className = 'calendar-day';
        dayButton.type = 'button';
        dayButton.textContent = String(day.getDate());
        dayButton.dataset.hasGuidance = String(dayRecords.length > 0);

        if (day.getMonth() !== month) {
          dayButton.classList.add('is-muted');
        }

        if (selectedDate === isoDate) {
          dayButton.classList.add('is-selected');
        }

        if (dayRecords.length) {
          dayButton.setAttribute('aria-label', dayRecords.length + ' guidance update' + (dayRecords.length === 1 ? '' : 's') + ' on ' + formatDisplayDate(day));
          dayButton.addEventListener('click', function (dateValue, recordsForDate) {
            return function () {
              selectedDate = dateValue;
              renderCalendar();
              renderResults();
              openGuidanceRecords(recordsForDate);
            };
          }(isoDate, dayRecords));
        }

        grid.appendChild(dayButton);
      }
    }

    function refresh() {
      selectedDate = '';
      populateFilters();
      var filterMonth = monthSelect.value;

      if (filterMonth) {
        calendarDate = new Date(Number(yearSelect.value), Number(filterMonth) - 1, 1);
      } else {
        var filteredRecords = getFilteredGuidance(records, { year: yearSelect.value, month: '', week: weekSelect.value });
        var latest = filteredRecords.sort(function (a, b) { return b.sortDate - a.sortDate; })[0] || records[0];
        if (latest) {
          calendarDate = new Date(latest.sortDate.getFullYear(), latest.sortDate.getMonth(), 1);
        }
      }

      renderCalendar();
      renderResults();
    }

    loadGuidanceCsv(source)
      .then(function (csv) {
        records = parseCsv(csv).map(function (record) {
          var date = parseLocalDate(record.date);
          return Object.assign({}, record, {
            sortDate: date,
            displayDate: formatDisplayDate(date),
            year: String(date.getFullYear()),
            month: String(date.getMonth() + 1).padStart(2, '0'),
            weekStart: formatIsoDate(getWeekStart(date))
          });
        }).filter(function (record) {
          return (record.status || '').toLowerCase() === 'published';
        }).sort(function (a, b) {
          return b.sortDate - a.sortDate;
        });

        if (records.length) {
          calendarDate = new Date(records[0].sortDate.getFullYear(), records[0].sortDate.getMonth(), 1);
        }

        refresh();
      })
      .catch(function () {
        if (title) {
          title.textContent = 'Guidance calendar unavailable';
        }
        if (resultsTitle) {
          resultsTitle.textContent = 'Unable to load updates';
        }
      });

    yearSelect.addEventListener('change', refresh);
    monthSelect.addEventListener('change', refresh);
    weekSelect.addEventListener('change', refresh);

    if (previous) {
      previous.addEventListener('click', function () {
        selectedDate = '';
        calendarDate.setMonth(calendarDate.getMonth() - 1);
        renderCalendar();
        renderResults();
      });
    }

    if (next) {
      next.addEventListener('click', function () {
        selectedDate = '';
        calendarDate.setMonth(calendarDate.getMonth() + 1);
        renderCalendar();
        renderResults();
      });
    }
  }

  document.querySelectorAll('[data-guidance-calendar]').forEach(function (section) {
    initGuidanceCalendar(section);
  });
});
  </script>
  <script>
document.addEventListener('DOMContentLoaded', function () {
  document.querySelectorAll('[data-org-search-form]').forEach(function (form) {
    var input = form.querySelector('[data-org-search-input]');
    var feedback = document.querySelector('[data-org-search-feedback]');
    var panels = Array.prototype.slice.call(document.querySelectorAll('.pod-workstream-panel'));
    var cards = Array.prototype.slice.call(document.querySelectorAll('.pod-card'));

    if (!input || !cards.length) {
      return;
    }

    function clearMatches() {
      cards.forEach(function (card) {
        card.classList.remove('is-search-match');
        card.hidden = false;
        card.querySelectorAll('.is-search-match').forEach(function (item) {
          item.classList.remove('is-search-match');
        });
      });
      panels.forEach(function (panel) {
        panel.hidden = false;
      });
    }

    function updateFeedback(message) {
      if (feedback) {
        feedback.textContent = message;
      }
    }

    function getPodName(card) {
      var podId = card.querySelector('.pod-id');
      var podLead = card.querySelector('.pod-lead');
      return [podId ? podId.textContent.trim() : '', podLead ? podLead.textContent.trim() : ''].filter(Boolean).join(' — ');
    }

    function runSearch() {
      var query = input.value.trim().toLowerCase();
      var matches = [];

      if (!query) {
        clearMatches();
        updateFeedback('Search a name to locate the POD it belongs to.');
        return;
      }

      cards.forEach(function (card) {
        var cardMatches = card.textContent.toLowerCase().indexOf(query) !== -1;
        card.hidden = !cardMatches;
        card.classList.toggle('is-search-match', cardMatches);

        card.querySelectorAll('.pod-id, .pod-lead, .pod-member').forEach(function (item) {
          item.classList.toggle('is-search-match', item.textContent.toLowerCase().indexOf(query) !== -1);
        });

        if (cardMatches) {
          matches.push(card);
        }
      });

      panels.forEach(function (panel) {
        panel.hidden = !panel.querySelector('.pod-card:not([hidden])');
      });

      if (!matches.length) {
        updateFeedback('No POD found for “' + input.value.trim() + '”.');
        return;
      }

      if (matches.length === 1) {
        updateFeedback('Showing ' + getPodName(matches[0]) + ' for “' + input.value.trim() + '”.');
        return;
      }

      updateFeedback('Showing ' + matches.length + ' PODs for “' + input.value.trim() + '”.');
    }

    form.addEventListener('submit', function (event) {
      event.preventDefault();
      runSearch();
    });

    input.addEventListener('input', runSearch);
    runSearch();
  });
});
  </script>
